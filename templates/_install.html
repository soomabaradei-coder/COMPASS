<style>
.install-bar{position:fixed;left:12px;right:12px;bottom:90px;z-index:55;background:#fff;
  border:1px solid var(--line,#e7ece8);border-radius:14px;box-shadow:0 12px 34px rgba(14,21,18,.16);
  padding:11px 10px 11px 12px;display:flex;align-items:center;gap:11px}
.install-bar[hidden]{display:none}
.install-bar img{width:36px;height:36px;border-radius:9px;flex:0 0 auto}
.install-bar .txt{flex:1;min-width:0}
.install-bar .txt b{font-size:13.5px;color:var(--ink,#0e1512);display:block;line-height:1.3}
.install-bar .txt span{font-size:12px;color:var(--faint,#8a978e)}
.install-bar .go{background:var(--accent,#0b731c);color:#fff;border:none;border-radius:9px;padding:8px 14px;
  font-family:inherit;font-weight:600;font-size:13px;cursor:pointer;display:none;flex:0 0 auto}
.install-bar .x{background:none;border:none;color:var(--faint,#8a978e);font-size:18px;cursor:pointer;
  padding:2px 6px;line-height:1;flex:0 0 auto}
@media(min-width:821px){.install-bar{display:none!important}}
</style>

<div class="install-bar" id="installBar" hidden>
  <img src="/static/icon-192.png" alt="COMPASS">
  <div class="txt">
    <b>Add COMPASS to your phone</b>
    <span id="installMsg">Install it as an app for full-screen access.</span>
  </div>
  <button class="go" id="installBtn" type="button">Install</button>
  <button class="x" id="installClose" aria-label="Dismiss">&times;</button>
</div>
<script>
  (function(){
    var standalone = (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches)
                     || window.navigator.standalone === true;
    if(standalone){ document.documentElement.classList.add('app-mode'); return; }   /* already the app */
    var ua = navigator.userAgent || '';
    var isMobile = (window.matchMedia && window.matchMedia('(max-width:820px)').matches)
                   || (('ontouchstart' in window) && /android|iphone|ipad|ipod/i.test(ua));
    if(!isMobile) return;                                        /* laptop -> plain webpage */
    try{ if(localStorage.getItem('compass_install_dismissed')) return; }catch(e){}
    var bar=document.getElementById('installBar'), btn=document.getElementById('installBtn'),
        msg=document.getElementById('installMsg'), x=document.getElementById('installClose');
    if(!bar) return;
    var isIOS = /iphone|ipad|ipod/i.test(ua);
    var deferred=null;
    window.addEventListener('beforeinstallprompt', function(e){ e.preventDefault(); deferred=e; if(btn) btn.style.display='inline-block'; });
    if(isIOS && msg){ msg.textContent="Tap Share, then ‘Add to Home Screen’."; }
    bar.hidden=false;
    if(btn){ btn.addEventListener('click', function(){
      if(deferred){ deferred.prompt(); deferred.userChoice.finally(function(){ deferred=null; bar.hidden=true; }); }
    }); }
    if(x){ x.addEventListener('click', function(){
      bar.hidden=true; try{ localStorage.setItem('compass_install_dismissed','1'); }catch(e){}
    }); }
  })();
</script>
